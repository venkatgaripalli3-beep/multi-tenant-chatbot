<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tenant Chatbot Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #333;
        }
        .company-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .company-btn:hover {
            background: #f0f0f0;
        }
        .company-btn.active {
            background: #e3f2fd;
            border-color: #2196F3;
            font-weight: 500;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #ddd;
            background: white;
        }
        .chat-header h1 {
            font-size: 18px;
            margin-bottom: 4px;
            color: #333;
        }
        .chat-header p {
            font-size: 13px;
            color: #999;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            margin-bottom: 12px;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #2196F3;
            color: white;
        }
        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
        }
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #ddd;
            background: white;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .input-area input:focus {
            outline: none;
            border-color: #2196F3;
        }
        .input-area button {
            padding: 10px 16px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }
        .input-area button:hover {
            background: #1976D2;
        }
        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .confidence {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Select Company</h2>
            <button class="company-btn active" onclick="switchCompany('chick-fil-a', this)">
                🍗 Chick-fil-A
            </button>
            <button class="company-btn" onclick="switchCompany('restaurant-b', this)">
                🍝 Restaurant B
            </button>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <h1>Multi-Tenant AI Chatbot Demo</h1>
                <p>Isolated data per company. No paid APIs. Free deployment.</p>
            </div>

            <div class="messages" id="messages">
                <div class="message bot">
                    <div class="message-content">Hi! I'm your AI assistant. Ask me anything about our company!</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://multi-tenant-chatbot-ku3w.onrender.com';
        let currentTenant = 'chick-fil-a';

        function switchCompany(tenantId, button) {
            currentTenant = tenantId;
            document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            document.getElementById('messages').innerHTML = '';
            const messagesDiv = document.getElementById('messages');
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot';
            welcomeDiv.innerHTML = '<div class="message-content">Hi! I\'m your AI assistant. Ask me anything about our company!</div>';
            messagesDiv.appendChild(welcomeDiv);
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const question = input.value.trim();
            if (!question) return;

            const messagesDiv = document.getElementById('messages');
            
            // Add user message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerHTML = `<div class="message-content">${question}</div>`;
            messagesDiv.appendChild(userDiv);
            
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tenant_id: currentTenant,
                        question: question
                    })
                });

                const data = await response.json();
                
                // Add bot message
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                botDiv.innerHTML = `
                    <div class="message-content">
                        ${data.answer}
                        <div class="confidence">Confidence: ${(data.confidence * 100).toFixed(0)}%</div>
                    </div>
                `;
                messagesDiv.appendChild(botDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message bot';
                errorDiv.innerHTML = '<div class="message-content">Sorry, I could not connect to the server. Make sure the backend is running.</div>';
                messagesDiv.appendChild(errorDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }
    </script>
</body>
</html>
